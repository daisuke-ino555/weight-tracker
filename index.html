<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>減量ログ Ver.1.3</title>
<style>
:root{--bg:#f7f8f5;--surface:#fff;--surface-strong:#eef4ef;--text:#17211b;--muted:#65726b;--line:#dce5dd;--primary:#1f7a5c;--primary-dark:#155d45;--accent:#2f65b8;--cal:#b06b22;--danger:#b74444;--shadow:0 18px 45px rgba(27,45,35,.09)}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);font-family:"Segoe UI","Hiragino Sans","Yu Gothic UI",sans-serif}
button,input,select,textarea{font:inherit}
.app-shell{width:min(1180px,calc(100% - 32px));margin:0 auto;padding:28px 0 40px}
.topbar,.form-head,.panel-head,.form-actions,.legend,.sleep-row,.top-actions{display:flex;align-items:center;gap:12px}
.topbar,.form-head,.panel-head,.form-actions{justify-content:space-between}
.topbar{margin-bottom:18px}
.eyebrow{margin:0 0 4px;color:var(--primary);font-size:.78rem;font-weight:700;text-transform:uppercase}
h1,h2{margin:0}h1{font-size:clamp(1.8rem,4vw,2.7rem)}h2{font-size:1.08rem}
button{min-height:42px;border-radius:8px;border:1px solid transparent;cursor:pointer;font-weight:700}
.icon-button{width:44px;color:var(--primary-dark);background:var(--surface);border-color:var(--line);box-shadow:var(--shadow);font-size:1.2rem}
.summary-band{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;overflow:hidden;margin-bottom:18px;border:1px solid var(--line);border-radius:8px;background:var(--line)}
.summary-band>div{min-width:0;padding:18px;background:var(--surface)}
.summary-label{display:block;margin-bottom:5px;color:var(--muted);font-size:.82rem}
.summary-band strong{display:block;overflow-wrap:anywhere;font-size:1.22rem}
.summary-note{display:block;margin-top:5px;color:var(--muted);font-size:.8rem}
.workspace{display:grid;grid-template-columns:minmax(320px,430px) minmax(0,1fr);gap:18px;align-items:start}
.entry-form,.chart-panel,.records-section{border:1px solid var(--line);border-radius:8px;background:var(--surface);box-shadow:var(--shadow);padding:18px}
.records-section{margin-top:18px}
.chart-stack{display:grid;gap:18px}
.field-grid,.memo-grid{display:grid;gap:12px;margin-top:16px}
.field-grid{grid-template-columns:repeat(2,minmax(0,1fr))}
.memo-grid{grid-template-columns:1fr}
label{display:grid;gap:6px;color:var(--muted);font-size:.86rem;font-weight:700}
input,select,textarea{width:100%;border:1px solid var(--line);border-radius:8px;background:#fbfcfa;color:var(--text);outline:none}
input,select{height:42px;padding:0 11px}
textarea{min-height:80px;resize:vertical;padding:10px 11px}
input:focus,select:focus,textarea:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(31,122,92,.15)}
.sleep-row input{max-width:88px}.sleep-row span{color:var(--text);font-weight:700}
.form-actions{margin-top:16px}
.primary-button,.danger-button,.ghost-button{padding:0 16px}
.primary-button{flex:1;color:#fff;background:var(--primary)}
.primary-button:hover{background:var(--primary-dark)}
.danger-button{color:var(--danger);background:#fff7f7;border-color:#f0cccc}
.ghost-button{color:var(--primary-dark);background:var(--surface-strong);border-color:#d6e7dc}
.legend{flex-wrap:wrap;justify-content:flex-end;color:var(--muted);font-size:.84rem}
.dot{display:inline-block;width:10px;height:10px;margin-right:5px;border-radius:999px}
.dot.weight{background:var(--primary)}.dot.average{background:var(--accent)}.dot.steps{background:#556b8e}.dot.calories{background:var(--cal)}
canvas{display:block;width:100%;height:auto;margin-top:14px;border:1px solid var(--line);border-radius:8px;background:linear-gradient(180deg,#fff 0%,#fbfcfa 100%)}
.muted{color:var(--muted);font-size:.9rem}
.table-wrap{overflow-x:auto;margin-top:12px}
table{width:100%;min-width:760px;border-collapse:collapse}
th,td{padding:12px 10px;border-bottom:1px solid var(--line);text-align:left;white-space:nowrap}
th{color:var(--muted);font-size:.82rem}
tbody tr{cursor:pointer}tbody tr:hover{background:#f4faf6}
.empty-state{margin:16px 0 0;color:var(--muted)}
#importFile{display:none}
@media(max-width:820px){
  .app-shell{width:min(100% - 20px,680px);padding-top:18px}
  .summary-band,.workspace,.field-grid{grid-template-columns:1fr}
  .summary-band>div{padding:14px}
  .panel-head{align-items:flex-start;flex-direction:column}
  .legend{justify-content:flex-start}
  .form-actions{align-items:stretch;flex-direction:column}
  .primary-button,.danger-button{width:100%}
}
</style>
</head>
<body>
<main class="app-shell">
  <header class="topbar">
    <div>
      <p class="eyebrow">Weight Loss Tracker Ver.1.3</p>
      <h1>減量ログ</h1>
    </div>
    <div class="top-actions">
      <button class="icon-button" id="importButton" type="button" title="JSONを読み込み" aria-label="JSONを読み込み">↑</button>
      <button class="icon-button" id="exportButton" type="button" title="JSONを書き出し" aria-label="JSONを書き出し">↓</button>
      <input id="importFile" type="file" accept="application/json,.json">
    </div>
  </header>

  <section class="summary-band" aria-label="サマリー">
    <div><span class="summary-label">今日の記録</span><strong id="todayStatus">-</strong><span class="summary-note" id="todayUpdated">-</span></div>
    <div><span class="summary-label">最新体重</span><strong id="latestWeight">-</strong></div>
    <div><span class="summary-label">目標70kgまで</span><strong id="targetDistance">-</strong></div>
    <div><span class="summary-label">7日平均</span><strong id="averageWeight">-</strong></div>
    <div><span class="summary-label">7日平均の条件</span><strong id="averageCondition">-</strong></div>
    <div><span class="summary-label">今週歩数（月〜今日）</span><strong id="weeklySteps">-</strong><span class="summary-note" id="weeklyStepsDiff">-</span></div>
    <div><span class="summary-label">今週消費カロリー（月〜今日）</span><strong id="weeklyCalories">-</strong><span class="summary-note" id="weeklyCaloriesDiff">-</span></div>
  </section>

  <section class="workspace">
    <form class="entry-form" id="entryForm">
      <div class="form-head">
        <h2>今日の記録</h2>
        <button class="ghost-button" id="todayButton" type="button">今日</button>
      </div>

      <div class="field-grid">
        <label>日付<input id="date" type="date" required></label>
        <label>体重 kg<input id="weight" type="number" inputmode="decimal" min="20" max="300" step="0.1" placeholder="68.4" required></label>
        <label>測定条件
          <select id="condition" required>
            <option value="朝風呂後">朝風呂後</option>
            <option value="夜風呂後">夜風呂後</option>
            <option value="その他">その他</option>
          </select>
        </label>
        <label>歩数<input id="steps" type="number" inputmode="numeric" min="0" step="1" placeholder="8500"></label>
        <label>睡眠時間
          <div class="sleep-row">
            <input id="sleepHours" type="number" inputmode="numeric" min="0" max="24" step="1" placeholder="7"><span>時間</span>
            <input id="sleepMinutes" type="number" inputmode="numeric" min="0" max="59" step="1" placeholder="0"><span>分</span>
          </div>
        </label>
        <label>消費カロリー kcal<input id="calories" type="number" inputmode="numeric" min="0" step="1" placeholder="450"></label>
      </div>

      <div class="memo-grid">
        <label>運動メモ<textarea id="exercise" rows="3" placeholder="ウォーキング40分、筋トレなど"></textarea></label>
      </div>

      <div class="form-actions">
        <button class="primary-button" type="submit">保存</button>
        <button class="danger-button" id="deleteButton" type="button">この日を削除</button>
      </div>
    </form>

    <div class="chart-stack">
      <section class="chart-panel" aria-label="体重グラフ">
        <div class="panel-head">
          <h2>体重推移</h2>
          <div class="legend">
            <span><i class="dot weight"></i>体重</span>
            <span><i class="dot average"></i>7日平均</span>
          </div>
        </div>
        <canvas id="weightChart" width="900" height="420"></canvas>
      </section>

      <section class="chart-panel" aria-label="歩数グラフ">
        <div class="panel-head">
          <h2>歩数推移</h2>
          <div class="legend"><span><i class="dot steps"></i>歩数</span></div>
        </div>
        <canvas id="stepsChart" width="900" height="320"></canvas>
      </section>

      <section class="chart-panel" aria-label="消費カロリーグラフ">
        <div class="panel-head">
          <h2>消費カロリー推移</h2>
          <div class="legend"><span><i class="dot calories"></i>消費kcal</span></div>
        </div>
        <canvas id="caloriesChart" width="900" height="320"></canvas>
      </section>
    </div>
  </section>

  <section class="records-section">
    <div class="panel-head">
      <h2>記録一覧</h2>
      <span id="recordCount" class="muted">0件</span>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>日付</th>
            <th>体重</th>
            <th>条件</th>
            <th>歩数</th>
            <th>睡眠</th>
            <th>消費kcal</th>
          </tr>
        </thead>
        <tbody id="recordsBody"></tbody>
      </table>
    </div>
    <p class="empty-state" id="emptyState">まだ記録がありません。今日の記録を保存すると一覧とグラフに表示されます。</p>
  </section>
</main>

<script>
const STORAGE_KEY = "weight-tracker-mvp-records";
const TARGET_WEIGHT = 70;
const conditionPriority = ["夜風呂後", "朝風呂後", "その他"];

const form = document.querySelector("#entryForm");
const recordsBody = document.querySelector("#recordsBody");
const emptyState = document.querySelector("#emptyState");
const recordCount = document.querySelector("#recordCount");
const todayStatus = document.querySelector("#todayStatus");
const todayUpdated = document.querySelector("#todayUpdated");
const latestWeight = document.querySelector("#latestWeight");
const targetDistance = document.querySelector("#targetDistance");
const averageWeight = document.querySelector("#averageWeight");
const averageCondition = document.querySelector("#averageCondition");
const weeklySteps = document.querySelector("#weeklySteps");
const weeklyStepsDiff = document.querySelector("#weeklyStepsDiff");
const weeklyCalories = document.querySelector("#weeklyCalories");
const weeklyCaloriesDiff = document.querySelector("#weeklyCaloriesDiff");

const weightChart = document.querySelector("#weightChart");
const stepsChart = document.querySelector("#stepsChart");
const caloriesChart = document.querySelector("#caloriesChart");

const fields = {
  date: document.querySelector("#date"),
  weight: document.querySelector("#weight"),
  condition: document.querySelector("#condition"),
  steps: document.querySelector("#steps"),
  sleepHours: document.querySelector("#sleepHours"),
  sleepMinutes: document.querySelector("#sleepMinutes"),
  calories: document.querySelector("#calories"),
  exercise: document.querySelector("#exercise")
};

let records = loadRecords();

function todayString() {
  const now = new Date();
  const offset = now.getTimezoneOffset() * 60000;
  return new Date(now.getTime() - offset).toISOString().slice(0, 10);
}

function dateFromString(dateText) {
  return new Date(`${dateText}T00:00:00`);
}

function toDateString(date) {
  const offset = date.getTimezoneOffset() * 60000;
  return new Date(date.getTime() - offset).toISOString().slice(0, 10);
}

function addDays(date, days) {
  const next = new Date(date);
  next.setDate(next.getDate() + days);
  return next;
}

function startOfWeekMonday(date) {
  const day = date.getDay();
  const diff = day === 0 ? -6 : 1 - day;
  return addDays(date, diff);
}

function loadRecords() {
  try {
    const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
    return Array.isArray(saved) ? saved : [];
  } catch {
    return [];
  }
}

function saveRecords() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
}

function sortedRecords() {
  return [...records].sort((a, b) => a.date.localeCompare(b.date));
}

function recentRecords() {
  return sortedRecords().slice(-7);
}

function numericValue(value) {
  const number = Number(value);
  return Number.isFinite(number) ? number : 0;
}

function formatNumber(value, digits = 1) {
  const number = Number(value);
  return Number.isFinite(number) ? number.toFixed(digits) : "-";
}

function formatDate(dateText) {
  const date = dateFromString(dateText);
  return new Intl.DateTimeFormat("ja-JP", {
    month: "numeric",
    day: "numeric",
    weekday: "short"
  }).format(date);
}

function formatDateTime(isoText) {
  if (!isoText) return "-";
  const date = new Date(isoText);
  if (Number.isNaN(date.getTime())) return "-";
  return new Intl.DateTimeFormat("ja-JP", {
    month: "numeric",
    day: "numeric",
    hour: "2-digit",
    minute: "2-digit"
  }).format(date);
}

function formatSigned(value, unit) {
  const sign = value > 0 ? "+" : "";
  return `前週同日比 ${sign}${value.toLocaleString("ja-JP")}${unit}`;
}

function getSleepMinutes(record) {
  if (!record) return null;

  const minutes = Number(record.sleepMinutes);
  if (Number.isFinite(minutes)) return Math.max(0, Math.round(minutes));

  const legacyHours = Number(record.sleep);
  if (Number.isFinite(legacyHours)) return Math.max(0, Math.round(legacyHours * 60));

  return null;
}

function formatSleep(record) {
  const minutes = getSleepMinutes(record);
  if (minutes == null) return "-";
  const hours = Math.floor(minutes / 60);
  const rest = minutes % 60;
  return `${hours}時間${rest}分`;
}

function getPreferredWeight(recordsForWindow) {
  for (const condition of conditionPriority) {
    const matches = recordsForWindow.filter((record) =>
      record.condition === condition && Number.isFinite(Number(record.weight))
    );

    if (matches.length > 0) {
      const total = matches.reduce((sum, record) => sum + Number(record.weight), 0);
      return {
        value: total / matches.length,
        condition,
        count: matches.length
      };
    }
  }
  return null;
}

function getAverageSeries(items) {
  return items.map((record, index) => {
    const windowItems = items.slice(Math.max(0, index - 6), index + 1);
    const preferred = getPreferredWeight(windowItems);
    return preferred ? Number(preferred.value.toFixed(2)) : null;
  });
}

function getRangeTotal(items, startDate, endDate, fieldName) {
  const start = toDateString(startDate);
  const end = toDateString(endDate);

  return items.reduce((sum, record) => {
    if (!record.date || record.date < start || record.date > end) return sum;
    return sum + numericValue(record[fieldName]);
  }, 0);
}

function getWeekComparison(items, fieldName) {
  const today = dateFromString(todayString());
  const thisMonday = startOfWeekMonday(today);
  const lastMonday = addDays(thisMonday, -7);
  const lastSameDay = addDays(today, -7);

  const current = getRangeTotal(items, thisMonday, today, fieldName);
  const previous = getRangeTotal(items, lastMonday, lastSameDay, fieldName);

  return { current, previous, diff: current - previous };
}

function fillForm(record) {
  const sleepMinutes = getSleepMinutes(record);

  fields.date.value = record?.date || todayString();
  fields.weight.value = record?.weight ?? "";
  fields.condition.value = record?.condition || "夜風呂後";
  fields.steps.value = record?.steps ?? "";
  fields.calories.value = record?.calories ?? "";
  fields.exercise.value = record?.exercise || "";

  if (sleepMinutes == null) {
    fields.sleepHours.value = "";
    fields.sleepMinutes.value = "";
  } else {
    fields.sleepHours.value = Math.floor(sleepMinutes / 60);
    fields.sleepMinutes.value = sleepMinutes % 60;
  }
}

function readForm() {
  const existing = records.find((record) => record.date === fields.date.value) || {};
  const hoursBlank = fields.sleepHours.value === "";
  const minutesBlank = fields.sleepMinutes.value === "";
  const totalSleepMinutes = hoursBlank && minutesBlank
    ? ""
    : numericValue(fields.sleepHours.value) * 60 + numericValue(fields.sleepMinutes.value);

  const nextRecord = {
    ...existing,
    date: fields.date.value,
    weight: Number(fields.weight.value),
    condition: fields.condition.value,
    steps: fields.steps.value === "" ? "" : Number(fields.steps.value),
    sleepMinutes: totalSleepMinutes,
    calories: fields.calories.value === "" ? "" : Number(fields.calories.value),
    exercise: fields.exercise.value.trim(),
    updatedAt: new Date().toISOString()
  };

  delete nextRecord.sleep;
  return nextRecord;
}

function upsertRecord(record) {
  const index = records.findIndex((item) => item.date === record.date);
  if (index >= 0) records[index] = record;
  else records.push(record);
  saveRecords();
  render();
}

function deleteSelectedDate() {
  const date = fields.date.value;
  records = records.filter((record) => record.date !== date);
  saveRecords();
  fillForm();
  render();
}

function renderSummary(items) {
  const latest = items.at(-1);
  const preferred = getPreferredWeight(recentRecords());
  const todayRecord = items.find((record) => record.date === todayString());
  const stepsComparison = getWeekComparison(items, "steps");
  const caloriesComparison = getWeekComparison(items, "calories");

  todayStatus.textContent = todayRecord ? "入力済み" : "未入力";
  todayUpdated.textContent = todayRecord?.updatedAt ? `更新 ${formatDateTime(todayRecord.updatedAt)}` : "-";

  latestWeight.textContent = latest ? `${formatNumber(latest.weight)} kg` : "-";

  if (latest && Number.isFinite(Number(latest.weight))) {
    const remaining = Number(latest.weight) - TARGET_WEIGHT;
    targetDistance.textContent =
      remaining > 0 ? `あと${remaining.toFixed(1)} kg` : `達成 ${Math.abs(remaining).toFixed(1)} kg`;
  } else {
    targetDistance.textContent = "-";
  }

  averageWeight.textContent = preferred ? `${formatNumber(preferred.value)} kg` : "-";
  averageCondition.textContent = preferred ? `${preferred.condition} ${preferred.count}件` : "-";

  weeklySteps.textContent = `${stepsComparison.current.toLocaleString("ja-JP")} 歩`;
  weeklyStepsDiff.textContent = formatSigned(stepsComparison.diff, "歩");

  weeklyCalories.textContent = `${caloriesComparison.current.toLocaleString("ja-JP")} kcal`;
  weeklyCaloriesDiff.textContent = formatSigned(caloriesComparison.diff, "kcal");
}

function renderRecords(items) {
  recordsBody.innerHTML = "";
  recordCount.textContent = `${items.length}件`;
  emptyState.hidden = items.length !== 0;

  [...items].reverse().forEach((record) => {
    const row = document.createElement("tr");
    row.innerHTML = `
      <td>${formatDate(record.date)}</td>
      <td>${formatNumber(record.weight)} kg</td>
      <td>${record.condition || "-"}</td>
      <td>${record.steps === "" || record.steps == null ? "-" : Number(record.steps).toLocaleString("ja-JP")}</td>
      <td>${formatSleep(record)}</td>
      <td>${record.calories === "" || record.calories == null ? "-" : `${Number(record.calories).toLocaleString("ja-JP")} kcal`}</td>
    `;
    row.addEventListener("click", () => fillForm(record));
    recordsBody.append(row);
  });
}

function setupCanvas(canvas, tall = false) {
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  canvas.width = Math.max(320, Math.floor(rect.width * dpr));
  canvas.height = Math.floor((tall ? (rect.width > 620 ? 420 : 330) : 300) * dpr);
  const ctx = canvas.getContext("2d");
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  return { ctx, width: canvas.width / dpr, height: canvas.height / dpr };
}

function drawEmpty(ctx, text) {
  ctx.fillStyle = "#65726b";
  ctx.font = "15px Segoe UI, sans-serif";
  ctx.fillText(text, 24, 44);
}

function renderWeightChart(items) {
  const { ctx, width, height } = setupCanvas(weightChart, true);
  ctx.clearRect(0, 0, width, height);

  if (items.length === 0) {
    drawEmpty(ctx, "記録を保存するとグラフが表示されます");
    return;
  }

  const weights = items.map((record) => Number(record.weight));
  const averages = getAverageSeries(items);
  const allValues = [...weights, ...averages].filter((value) => Number.isFinite(value));
  const min = Math.floor(Math.min(...allValues) - 1);
  const max = Math.ceil(Math.max(...allValues) + 1);
  const padding = { top: 22, right: 20, bottom: 42, left: 48 };
  const plotWidth = width - padding.left - padding.right;
  const plotHeight = height - padding.top - padding.bottom;
  const xStep = items.length > 1 ? plotWidth / (items.length - 1) : 0;
  const y = (value) => padding.top + ((max - value) / Math.max(1, max - min)) * plotHeight;
  const x = (index) => padding.left + (items.length === 1 ? plotWidth / 2 : index * xStep);

  ctx.strokeStyle = "#dce5dd";
  ctx.lineWidth = 1;
  ctx.fillStyle = "#65726b";
  ctx.font = "12px Segoe UI, sans-serif";

  for (let i = 0; i <= 4; i += 1) {
    const value = min + ((max - min) / 4) * i;
    const gridY = y(value);
    ctx.beginPath();
    ctx.moveTo(padding.left, gridY);
    ctx.lineTo(width - padding.right, gridY);
    ctx.stroke();
    ctx.fillText(`${value.toFixed(1)}`, 8, gridY + 4);
  }

  function drawLine(values, color, lineWidth) {
    ctx.strokeStyle = color;
    ctx.lineWidth = lineWidth;
    ctx.beginPath();
    values.forEach((value, index) => {
      if (!Number.isFinite(value)) return;
      if (index === 0) ctx.moveTo(x(index), y(value));
      else ctx.lineTo(x(index), y(value));
    });
    ctx.stroke();
  }

  drawLine(averages, "#2f65b8", 3);
  drawLine(weights, "#1f7a5c", 2);

  weights.forEach((value, index) => {
    ctx.fillStyle = "#1f7a5c";
    ctx.beginPath();
    ctx.arc(x(index), y(value), 4, 0, Math.PI * 2);
    ctx.fill();
  });

  averages.forEach((value, index) => {
    if (!Number.isFinite(value)) return;
    ctx.fillStyle = "#2f65b8";
    ctx.beginPath();
    ctx.arc(x(index), y(value), 3.5, 0, Math.PI * 2);
    ctx.fill();
  });

  ctx.fillStyle = "#65726b";
  ctx.font = "12px Segoe UI, sans-serif";
  items.forEach((record, index) => {
    if (items.length > 10 && index % 2 !== 0) return;
    ctx.fillText(formatDate(record.date), x(index) - 18, height - 16);
  });
}

function renderBarChart(canvas, items, fieldName, color, emptyText) {
  const { ctx, width, height } = setupCanvas(canvas, false);
  ctx.clearRect(0, 0, width, height);

  if (items.length === 0) {
    drawEmpty(ctx, emptyText);
    return;
  }

  const values = items.map((record) => numericValue(record[fieldName]));
  const max = Math.max(1, Math.ceil(Math.max(...values) * 1.15));
  const padding = { top: 22, right: 20, bottom: 42, left: 54 };
  const plotWidth = width - padding.left - padding.right;
  const plotHeight = height - padding.top - padding.bottom;
  const slot = plotWidth / Math.max(1, items.length);
  const barWidth = Math.max(10, Math.min(34, slot * 0.58));

  ctx.strokeStyle = "#dce5dd";
  ctx.lineWidth = 1;
  ctx.fillStyle = "#65726b";
  ctx.font = "12px Segoe UI, sans-serif";

  for (let i = 0; i <= 4; i += 1) {
    const value = (max / 4) * i;
    const gridY = padding.top + ((max - value) / max) * plotHeight;
    ctx.beginPath();
    ctx.moveTo(padding.left, gridY);
    ctx.lineTo(width - padding.right, gridY);
    ctx.stroke();
    ctx.fillText(Math.round(value).toLocaleString("ja-JP"), 6, gridY + 4);
  }

  values.forEach((value, index) => {
    const barHeight = (value / max) * plotHeight;
    const x = padding.left + slot * index + (slot - barWidth) / 2;
    const y = padding.top + plotHeight - barHeight;
    ctx.fillStyle = color;
    ctx.fillRect(x, y, barWidth, barHeight);

    if (items.length <= 7 && value > 0) {
      ctx.fillStyle = "#65726b";
      ctx.fillText(Math.round(value).toLocaleString("ja-JP"), x - 6, y - 6);
    }
  });

  ctx.fillStyle = "#65726b";
  ctx.font = "12px Segoe UI, sans-serif";
  items.forEach((record, index) => {
    if (items.length > 10 && index % 2 !== 0) return;
    const labelX = padding.left + slot * index + slot / 2 - 18;
    ctx.fillText(formatDate(record.date), labelX, height - 16);
  });
}

function render() {
  const items = sortedRecords();
  renderSummary(items);
  renderRecords(items);
  renderWeightChart(items);
  renderBarChart(stepsChart, items, "steps", "#556b8e", "歩数を保存するとグラフが表示されます");
  renderBarChart(caloriesChart, items, "calories", "#b06b22", "消費カロリーを保存するとグラフが表示されます");
}

function importRecordsFromJson(text) {
  const parsed = JSON.parse(text);
  if (!Array.isArray(parsed)) throw new Error("JSONの形式が正しくありません。");

  const normalized = parsed
    .filter((record) => record && typeof record === "object" && record.date)
    .map((record) => ({ ...record }));

  if (!confirm(`JSONから${normalized.length}件の記録を読み込みます。現在のデータは上書きされます。よろしいですか？`)) {
    return;
  }

  records = normalized;
  saveRecords();
  fillForm(records.find((record) => record.date === todayString()));
  render();
  alert("インポートが完了しました。");
}

form.addEventListener("submit", (event) => {
  event.preventDefault();
  upsertRecord(readForm());
});

document.querySelector("#deleteButton").addEventListener("click", deleteSelectedDate);

document.querySelector("#todayButton").addEventListener("click", () => {
  const existing = records.find((record) => record.date === todayString());
  fillForm(existing);
});

document.querySelector("#exportButton").addEventListener("click", () => {
  const blob = new Blob([JSON.stringify(sortedRecords(), null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const link = document.createElement("a");
  link.href = url;
  link.download = "weight-tracker-records.json";
  link.click();
  URL.revokeObjectURL(url);
});

document.querySelector("#importButton").addEventListener("click", () => {
  document.querySelector("#importFile").click();
});

document.querySelector("#importFile").addEventListener("change", (event) => {
  const file = event.target.files?.[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = () => {
    try {
      importRecordsFromJson(String(reader.result || ""));
    } catch (error) {
      alert(`インポートできませんでした。${error.message}`);
    } finally {
      event.target.value = "";
    }
  };
  reader.readAsText(file, "utf-8");
});

fields.date.addEventListener("change", () => {
  const existing = records.find((record) => record.date === fields.date.value);
  if (existing) fillForm(existing);
});

window.addEventListener("resize", render);

fillForm(records.find((record) => record.date === todayString()));
render();
</script>
</body>
